<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureEyes</title>
    <link rel="stylesheet" href="styles/login-page.css">
    
    <link rel="icon" type="image/png" href="images/web-logo.png?v">

</head>
<body>

    <script>

        const savedTheme = localStorage.getItem('theme');
    
        if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
            }
    </script>
    
    <div class="login-container">

        
    
         <svg id="web-logo" xmlns="http://www.w3.org/2000/svg" width="24" 
     height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
       class="lucide lucide-shield-check w-8 h-8 text-white" 
       data-fg-djkv9="1.43:1.6216:/src/app/components/LoginPage.tsx:38:13:1654:46:e:ShieldCheck::::::CqaD">
       <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 
       6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path><path d="m9 12 2 2 4-4"></path></svg>

       <h1 id="web-name" >SecureEyes System</h1>
       <p id="intro-text" >Enter your credentials to access the surveillance grid. </p>

        <p class="input-label">OFFICER ID / EMAIL</p>

        <div class="input-wrapper">
        <svg class="icon" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2">
        <rect width="20" height="16" x="2" y="4" rx="2"></rect>
        <path d="m22 7-10 5L2 7"></path>
         </svg>
         <input id="mail-input" type="text" placeholder="office@secureeyes.com">
        </div>

          <p class="input-label">PASSCODE</p>

        <div class="input-wrapper">

            <svg class="icon" xmlns="http://www.w3.org/2000/svg" 
        width="18" height="18" viewBox="0 0 24 24" 
        fill="none" stroke="currentColor" stroke-width="2" 
        stroke-linecap="round" stroke-linejoin="round">
     
        <rect x="3" y="11" width="18" height="10" rx="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>

         <input id="pass-input" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
        </div>


       <div class="remember-forgot-column" >

        <div class="remember-device">       
        <input class="remember-device-checkbox" type="checkbox" name="device">
       <label  for="device">Remember device</label>
         </div>


       <p id="forgot-passcode">Forgot passcode?</p>
        </div>

        
       
             <button id="access-button" >
                <span class="btn-text">Access Dashboard</span>
                <span class="loader"></span>
        </button>
   
       
    
        <div class="about-security" >
            <p class="security-texts">Protected by End-to-End Encryption.</p>
            <p class="security-texts">Unauthorized access is a criminal offense.</p>
        </div>
      </div>

      <script src="js/login-page.js"></script>
      <script src="js/theme-toggle.js"></script>
</body>
</html>
